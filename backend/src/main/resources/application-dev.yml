spring:
  datasource:
    url: jdbc:postgresql://db:5432/tba_waad_system
    username: postgres
    password: ${DB_PASSWORD:12345}
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  flyway:
    validate-on-migrate: false
    clean-disabled: false

jwt:
  secret: ${JWT_SECRET:waad_tba_system_secure_secret_long_string_2026_9dda11e5_28fd_4086_a6c7}

logging:
  level:
    root: INFO
    com.waad.tba: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
