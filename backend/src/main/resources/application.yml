spring:
  application:
    name: tba-waad-system-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tba_waad_system}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000

  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:60MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:60MB}

  main:
    allow-circular-references: false

  mail:
    host: ${EMAIL_HOST:smtp.hostinger.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
      debug: false
    test-connection: false

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        use_sql_comments: true
      jakarta:
        persistence:
          lock:
            timeout: 30000



  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
        one-indexed-parameters: false

  flyway:
    locations: classpath:db/migration
    out-of-order: false
    validate-on-migrate: true
    # baseline-on-migrate: true ensures Flyway works on an existing database
    # where flyway_schema_history was absent/dropped. Baseline at 0 means all
    # V001–V095 migrations run (idempotent: all use IF NOT EXISTS / ON CONFLICT).
    baseline-on-migrate: true
    baseline-version: 0

server:
  tomcat:
    threads:
      max: 400
      min-spare: 20
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 200
  error:
    include-message: always
    include-stacktrace: never
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        name: JSESSIONID
        http-only: true

jwt:
  expiration: 86400000
  secret: ${JWT_SECRET:waad_tba_system_secure_secret_long_string_2026_9dda11e5_28fd_4086_a6c7}

security:
  password-reset-token-validity-hours: ${PASSWORD_RESET_TOKEN_VALIDITY_HOURS:1}
  email-verification-token-validity-hours: ${EMAIL_VERIFICATION_TOKEN_VALIDITY_HOURS:24}
  require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
  account-lockout-duration-minutes: ${ACCOUNT_LOCKOUT_DURATION_MINUTES:30}
  max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}

email:
  from: ${EMAIL_FROM:support@alwahacare.com}
  from-name: ${EMAIL_FROM_NAME:شركة وعد لإدارة النفقات الطبية}
  enabled: ${EMAIL_ENABLED:false}

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://waadapp.ly,https://www.waadapp.ly}

file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    local:
      base-dir: ${FILE_STORAGE_LOCAL_BASE_DIR:./storage/uploads}
    s3:
      region: ${AWS_REGION:me-south-1}
      bucket-name: ${AWS_S3_BUCKET:waad-medical-documents}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

# ═══════════════════════════════════════════════════════════
# WAAD FEATURE FLAGS (Phase 10)
# ═══════════════════════════════════════════════════════════
waad:
  features:
    # false = Batches ONLY (Current Requirement 2026-03-06)
    provider-portal-enabled: ${WAAD_FEATURE_PROVIDER_PORTAL:false}
    # false = Direct claim creation via VISIT is disabled
    direct-claim-submission-enabled: ${WAAD_FEATURE_DIRECT_CLAIMS:false}
    # Always true as it is our primary source
    batch-claims-enabled: true
    max-size:
      document: ${MAX_DOCUMENT_SIZE:10485760}
      image: ${MAX_IMAGE_SIZE:52428800}
    allowed-types:
      - application/pdf
      - image/jpeg
      - image/png
      - image/jpg
      - application/dicom
      - application/x-dicom


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.waad.tba: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.type.descriptor.sql: WARN
    # Suppress intentional AuthenticationProvider configuration warning
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    # Flyway supports up to PostgreSQL 16; we run 18 which works fine — suppress version noise
    org.flywaydb.core.internal.database.base.Database: ERROR
