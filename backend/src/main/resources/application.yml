spring:
  application:
    name: tba-waad-system-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tba_waad_system}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:60MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:60MB}

  main:
    allow-circular-references: false

  mail:
    host: ${EMAIL_HOST:smtp.hostinger.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
      debug: false
    test-connection: false

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        use_sql_comments: true
      jakarta:
        persistence:
          lock:
            timeout: 30000

  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
        one-indexed-parameters: false

  flyway:
    locations: classpath:db/migration

server:
  error:
    include-message: always
    include-stacktrace: on_param
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        name: JSESSIONID
        http-only: true

jwt:
  expiration: 86400000
  secret: ${JWT_SECRET:waad_tba_system_secure_secret_long_string_2026_9dda11e5_28fd_4086_a6c7}

security:
  password-reset-token-validity-hours: ${PASSWORD_RESET_TOKEN_VALIDITY_HOURS:1}
  email-verification-token-validity-hours: ${EMAIL_VERIFICATION_TOKEN_VALIDITY_HOURS:24}
  require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
  account-lockout-duration-minutes: ${ACCOUNT_LOCKOUT_DURATION_MINUTES:30}
  max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}

email:
  from: ${EMAIL_FROM:support@alwahacare.com}
  from-name: ${EMAIL_FROM_NAME:شركة وعد لإدارة النفقات الطبية}
  enabled: ${EMAIL_ENABLED:false}

file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    local:
      base-path: ${FILE_STORAGE_PATH:./uploads}
    max-size:
      document: ${MAX_DOCUMENT_SIZE:10485760}
      image: ${MAX_IMAGE_SIZE:52428800}
    allowed-types:
      - application/pdf
      - image/jpeg
      - image/png
      - image/jpg
      - application/dicom
      - application/x-dicom

logging:
  level:
    root: INFO
    com.waad.tba: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.type.descriptor.sql: WARN