<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${reportTitle}">PDF Report</title>
    
    <style>
        /* ========== Page Setup ========== */
        @page {
            size: A4;
            margin-top: th:text="${company.marginTop != null ? company.marginTop + 'mm' : '20mm'}";
            margin-bottom: th:text="${company.marginBottom != null ? company.marginBottom + 'mm' : '20mm'}";
            margin-left: th:text="${company.marginLeft != null ? company.marginLeft + 'mm' : '20mm'}";
            margin-right: th:text="${company.marginRight != null ? company.marginRight + 'mm' : '20mm'}";
            
            @top-center {
                content: element(header);
            }
            
            @bottom-center {
                content: element(footer);
            }
        }
        
        /* ========== Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Traditional Arabic', 'Arial', sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
            direction: rtl;
        }
        
        /* ========== Header ========== */
        #header {
            position: running(header);
            width: 100%;
            padding: 10mm 0;
            border-bottom: 2px solid;
            border-bottom-color: th:text="${company.headerColor != null ? company.headerColor : '#1976d2'}";
            margin-bottom: 5mm;
        }
        
        .header-content {
            display: table;
            width: 100%;
        }
        
        .header-logo {
            display: table-cell;
            width: 20%;
            text-align: right;
            vertical-align: middle;
        }
        
        .header-logo img {
            max-height: 50px;
            max-width: 100%;
        }
        
        .header-info {
            display: table-cell;
            width: 80%;
            text-align: center;
            vertical-align: middle;
            padding-right: 10px;
        }
        
        .header-company-name {
            font-size: 18pt;
            font-weight: bold;
            color: th:text="${company.headerColor != null ? company.headerColor : '#1976d2'}";
            margin-bottom: 3px;
        }
        
        .header-details {
            font-size: 9pt;
            color: #666;
        }
        
        .header-details span {
            display: inline-block;
            margin: 0 8px;
        }
        
        /* ========== Footer ========== */
        #footer {
            position: running(footer);
            width: 100%;
            padding-top: 5mm;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 9pt;
            color: th:text="${company.footerColor != null ? company.footerColor : '#757575'}";
        }
        
        .footer-text {
            margin-bottom: 3px;
        }
        
        .footer-page {
            font-size: 8pt;
            color: #999;
        }
        
        /* ========== Content ========== */
        .report-title {
            font-size: 16pt;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10mm;
            color: #1976d2;
        }
        
        .section {
            margin-bottom: 8mm;
        }
        
        .section-title {
            font-size: 13pt;
            font-weight: bold;
            color: #1976d2;
            margin-bottom: 4mm;
            padding-bottom: 2mm;
            border-bottom: 1px solid #e0e0e0;
        }
        
        /* ========== Tables ========== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 5mm;
            table-layout: fixed;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: right;
            vertical-align: top;
        }
        
        th {
            background-color: #f5f5f5;
            font-weight: bold;
            font-size: 10pt;
        }
        
        td {
            font-size: 10pt;
        }
        
        /* Prevent page breaks inside table rows */
        tr {
            page-break-inside: avoid;
        }
        
        /* Zebra striping */
        tbody tr:nth-child(even) {
            background-color: #fafafa;
        }
        
        /* ========== Info Blocks ========== */
        .info-grid {
            display: table;
            width: 100%;
            border: 1px solid #ddd;
            margin-bottom: 5mm;
        }
        
        .info-row {
            display: table-row;
        }
        
        .info-label {
            display: table-cell;
            width: 30%;
            background-color: #f5f5f5;
            padding: 6px 8px;
            font-weight: bold;
            border: 1px solid #ddd;
        }
        
        .info-value {
            display: table-cell;
            width: 70%;
            padding: 6px 8px;
            border: 1px solid #ddd;
        }
        
        /* ========== Utilities ========== */
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .text-right { text-align: right; }
        
        .mt-1 { margin-top: 3mm; }
        .mt-2 { margin-top: 5mm; }
        .mb-1 { margin-bottom: 3mm; }
        .mb-2 { margin-bottom: 5mm; }
        
        .font-bold { font-weight: bold; }
        .font-small { font-size: 9pt; }
        
        .color-primary { color: #1976d2; }
        .color-success { color: #4caf50; }
        .color-error { color: #f44336; }
        .color-warning { color: #ff9800; }
        
        /* ========== Page Breaks ========== */
        .page-break {
            page-break-after: always;
        }
        
        .no-page-break {
            page-break-inside: avoid;
        }
    </style>
</head>
<body>
    <!-- ========== Header (Running Element) ========== -->
    <div id="header">
        <div class="header-content">
            <div class="header-logo" th:if="${company.hasLogo()}">
                <img th:src="${company.logoBase64DataUrl}" alt="Company Logo"/>
            </div>
            <div class="header-info">
                <div class="header-company-name" th:text="${company.companyName}">نظام وعد الطبي</div>
                <div class="header-details">
                    <span th:if="${company.address}" th:text="${company.address}">الرياض</span>
                    <span th:if="${company.phone}">•</span>
                    <span th:if="${company.phone}" th:text="${company.phone}">+966XXXXXXXXX</span>
                    <span th:if="${company.email}">•</span>
                    <span th:if="${company.email}" th:text="${company.email}">info@waad.com</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ========== Footer (Running Element) ========== -->
    <div id="footer">
        <div class="footer-text" th:text="${company.footerText}">جميع الحقوق محفوظة © 2026</div>
        <div class="footer-page">
            صفحة <span class="page-number"></span> من <span class="page-count"></span>
        </div>
    </div>
    
    <!-- ========== Main Content ========== -->
    <div class="content">
        <!-- Report Title -->
        <h1 class="report-title" th:text="${reportTitle}">التقرير</h1>
        
        <!-- Content blocks will be inserted here by specific templates -->
        <th:block th:replace="${contentFragment}">
            <!-- This will be replaced by specific template content -->
        </th:block>
    </div>
</body>
</html>
