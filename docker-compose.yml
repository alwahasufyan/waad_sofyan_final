services:
  db:
    image: postgres:16
    container_name: waadapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tba_waad_system
      POSTGRES_USER: postgres
      # Keep this aligned with backend DB_PASSWORD below.
      # Changing it after DB volume init requires ALTER USER or volume reset.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tba_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: waadapp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/tba_waad_system}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      # Must match Postgres password used by the db service.
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:-waad_local_jwt_secret_32_chars_minimum_value_2026}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin@123}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
    volumes:
      - ./uploads:/app/uploads
    # NOTE: port 8080 intentionally NOT exposed — all traffic routes through nginx reverse proxy
    networks:
      - tba_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        NGINX_CONFIG: ${NGINX_CONFIG:-nginx.local.conf}
    container_name: waadapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # محلياً استخدم 3000 بدل 80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tba_network

networks:
  tba_network:
    driver: bridge

volumes:
  pgdata:
