# ── Rate Limiting Zones ─────────────────────────────────────────────────────
# General API: 20 req/s per IP burst=40 to handle normal usage
limit_req_zone  $binary_remote_addr zone=api:10m    rate=20r/s;
# Auth endpoints: strict 5 req/min per IP to prevent brute-force
limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name localhost;
    
    # Redirect all HTTP requests to HTTPS with a 301 Moved Permanently response.
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name localhost;

    # SSL Certificates (Must be mounted via Docker volumes in production)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # SSL Security Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    
    # Strict-Transport-Security (HSTS) enabled for HTTPS
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔥 IMPORTANT: Proxy API to backend container
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Specify HTTPS protocol

        # Timeouts: 60s for normal requests, kept higher only for bulk imports
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        send_timeout          60s;

        # Upload limit aligned with Spring multipart config (60MB)
        client_max_body_size 60M;
    }

    # Auth endpoints: strict rate limiting against brute-force
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend:8080/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}