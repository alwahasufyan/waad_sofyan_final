version: "2"
type: backend
tech_stack:
  - Java 17
  - Spring Boot
  - JPA / Hibernate
  - Flyway Migrations
  - JWT + Session-based Security
  - Lombok
features:
  - name: Authentication Management
    description: |
      Handles user login via POST /api/v1/auth/login with JSON body containing identifier and password.
      IMPORTANT: The response wraps the JWT inside a nested 'data' object:
      { "status": "success", "data": { "token": "JWT_HERE", "user": {...} } }
      Test code MUST extract token from response.json()['data']['token'] NOT from response.json()['token'].
      Use credentials: identifier=superadmin@tba.sa, password=Admin@123
    files:
      - backend/src/main/java/com/waad/tba/modules/auth/controller/AuthController.java
    endpoints:
      - method: POST
        path: /api/v1/auth/login
        description: Authenticate user and return JWT. Token is nested inside data.token not at root level.
        auth_required: false
        request_schema:
          body:
            identifier: string
            password: string
        response_schema:
          "200":
            status: success
            data:
              token: string
              user:
                id: number
                email: string
                roles: array
          "401": Unauthorized
    depends_on: []

  - name: Medical Categories API
    description: CRUD for medical categories (reference data). Base URL is /api/v1/medical-categories NOT /api/provider/medical-categories.
    files:
      - backend/src/main/java/com/waad/tba/modules/medicaltaxonomy/controller/MedicalCategoryController.java
    endpoints:
      - method: GET
        path: /api/v1/medical-categories/all
        description: List all active medical categories (no pagination)
        auth_required: true
        response_schema:
          "200": MedicalCategoryResponseDto[]
      - method: GET
        path: /api/v1/medical-categories
        description: List paginated medical categories
        auth_required: true
        response_schema:
          "200": Page of MedicalCategoryResponseDto
      - method: GET
        path: /api/v1/medical-categories/{id}/services
        description: List active medical services belonging to a specific category. This is the ONLY way to get services for claim submission.
        auth_required: true
        response_schema:
          "200": MedicalServiceResponseDto[]
    depends_on:
      - Authentication Management

  - name: Claims API
    description: |
      Visit-centric claim creation. Base URL is /api/v1/claims.
      Claims require a valid visitId. Line items require medicalServiceId and serviceCategoryId.
      The backend auto-calculates all prices from the provider contract.
    files:
      - backend/src/main/java/com/waad/tba/modules/claim/controller/ClaimController.java
    endpoints:
      - method: POST
        path: /api/v1/claims
        description: Create a new medical claim from a visit
        auth_required: true
        request_schema:
          body:
            visitId: number
            doctorName: string
            diagnosisCode: string
            diagnosisDescription: string
            lines:
              - medicalServiceId: number
                serviceCategoryId: number
                serviceCategoryName: string
                quantity: number
        response_schema:
          "200": ClaimResponse
          "400": Business Rule Exception
      - method: GET
        path: /api/v1/claims
        description: List all claims with pagination
        auth_required: true
        response_schema:
          "200": Page of ClaimListResponse
    depends_on:
      - Authentication Management
      - Medical Categories API

  - name: Member Eligibility API
    description: |
      Checks member eligibility and remaining financial limits.
      Base URL is /api/v1/members NOT /api/v1/eligibility.
      Remaining limit endpoint requires a memberId path variable.
    files:
      - backend/src/main/java/com/waad/tba/modules/member/controller/UnifiedEligibilityController.java
    endpoints:
      - method: GET
        path: /api/v1/members/{memberId}/remaining-limit
        description: Get remaining coverage limit for a specific member. memberId must be a valid numeric ID.
        auth_required: true
        response_schema:
          "200":
            status: success
            data:
              memberId: number
              annualLimit: number
              usedAmount: number
              remainingLimit: number
      - method: GET
        path: /api/v1/members/eligibility
        description: Check member eligibility by card number or barcode. Use query param.
        auth_required: true
        request_schema:
          query:
            query: string
        response_schema:
          "200": EligibilityResultDto
          "400": Invalid input format
          "404": Member not found
    depends_on:
      - Authentication Management

known_limitations:
  - issue: JWT token is nested inside response.data.token not at response root
    location: backend/src/main/java/com/waad/tba/modules/auth/controller/AuthController.java
    impact: Test scripts must use response.json()['data']['token'] to extract the JWT token.
  - issue: Medical categories endpoint is /api/v1/medical-categories not /api/provider/medical-categories
    location: backend/src/main/java/com/waad/tba/modules/medicaltaxonomy/controller/MedicalCategoryController.java
    impact: Wrong endpoint path causes 500 NoResourceFoundException.
  - issue: Remaining limit endpoint requires memberId path variable not a query param
    location: backend/src/main/java/com/waad/tba/modules/member/controller/UnifiedEligibilityController.java
    impact: Must call /api/v1/members/{memberId}/remaining-limit with a real numeric member ID.
  - issue: Strict enforcement of categoryId in ClaimLine
    location: backend/src/main/java/com/waad/tba/modules/claim/entity/ClaimLine.java
    impact: Fixed - now uses UI-provided categoryId if DB category is null.
